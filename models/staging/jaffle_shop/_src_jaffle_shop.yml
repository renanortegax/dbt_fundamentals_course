version: 2

sources:
  - name: jaffle_shop
    description: a clone do postgress db (example)
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        description: raw customer data (not transformed)
        columns:
          - name: id
            description: PK table
            data_type: bigint
            data_tests:
              - unique
              - not_null
          - name: first_name
            data_type: string
          - name: last_name
            data_type: string

      - name: orders
        columns:
          - name: id
            data_type: bigint
          - name: user_id
            data_type: bigint
          - name: order_date
            data_type: date
          - name: status
            data_type: string
        config:
          freshness:
            warn_after:
              count: 7
              period: day
            error_after:
              count: 14
              period: day
          
          # loaded_at_field: order_date (precisa ser timestamp - no curso tinha uma coluna de "_etl_loaded_at", provavelmente pq no curso usou snowflake)