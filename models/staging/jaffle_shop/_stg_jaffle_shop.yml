models:
  - name: stg_jaffle_shop__customers
    description: one unique customer_id per row
    columns:
      - name: customer_id
        description: PK table
        data_tests:
          - unique
          - not_null

  - name: stg_jaffle_shop__orders
    description: one unique order_id per row
    columns:
      - name: order_id
        description: PK table
        data_tests:
          - unique
          - not_null
      - name: status
        description: "{{ doc('order_status') }}"
        data_tests:
          - accepted_values:
              arguments:
                values: ['returned','completed','return_pending','shipped','placed']
      - name: customer_id
        description: FK to stg_jaffle_shop__customers.customer_id
        data_tests:
          - relationships:
              arguments:
                field: customer_id
                to: ref('stg_jaffle_shop__customers')